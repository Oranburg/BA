<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>BA redirect</title>
    <script>
      const l = window.location;
      const base = "/BA/";
      const path = l.pathname.startsWith(base) ? l.pathname.slice(base.length) : "";
      const redirect =
        l.protocol +
        "//" +
        l.hostname +
        (l.port ? ":" + l.port : "") +
        base +
        "?/" +
        path.replace(/&/g, "~and~") +
        (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
        l.hash;
      l.replace(redirect);
    </script>
  </head>
  <body></body>
</html>
